server:
  port: 8086
spring:
  application:
    name: risk-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trading_platform}
    username: ${SPRING_DATASOURCE_USERNAME:trading_user}
    password: ${SPRING_DATASOURCE_PASSWORD:trading_pass}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: risk-service-group
