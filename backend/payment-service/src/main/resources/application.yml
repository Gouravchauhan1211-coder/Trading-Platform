spring:
  application:
    name: payment-service
  
  # Virtual Threads (Java 21+)
  threads:
    virtual:
      enabled: true
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:winvestco_payment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true

server:
  port: 8093

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true  # Enables /actuator/health/liveness and /actuator/health/readiness
    prometheus:
      enabled: true
  health:
    # Kubernetes probes
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    # Dependency health indicators
    db:
      enabled: true
    rabbit:
      enabled: true
    diskSpace:
      enabled: true
      threshold: 10MB
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  # OpenTelemetry Tracing Configuration
  tracing:
    enabled: true
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
      transport: http

# JWT Configuration (must match other services)
jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

# Razorpay Configuration
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}

# Payment Configuration
payment:
  # Payment expiry in minutes (15 minutes default)
  expiry-minutes: 15
  # Currency
  currency: INR

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api/payments/v3/api-docs
  swagger-ui:
    path: /api/payments/swagger-ui.html

logging:
  level:
    in.winvestco.payment_service: DEBUG
    org.springframework.amqp: INFO
    com.razorpay: DEBUG

# Resilience4j Configuration
resilience4j:
  # Circuit Breaker - Fail-fast for Razorpay API and ledger-service
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - com.razorpay.RazorpayException
          - feign.FeignException$ServiceUnavailable
          - feign.FeignException$InternalServerError
        ignoreExceptions:
          - feign.FeignException$BadRequest
          - feign.FeignException$NotFound
          - in.winvestco.common.exception.NonRetryableException
    instances:
      razorpayApi:
        baseConfig: default
        failureRateThreshold: 30  # Stricter for payment gateway
        waitDurationInOpenState: 60s  # Longer cooldown for payment failures
      ledgerService:
        baseConfig: default

  # Retry - Exponential Backoff with Jitter for payment operations
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - com.razorpay.RazorpayException
          - feign.RetryableException
        ignoreExceptions:
          - feign.FeignException$BadRequest
          - feign.FeignException$NotFound
          - feign.FeignException$Unauthorized
          - in.winvestco.common.exception.NonRetryableException
    instances:
      razorpayApi:
        baseConfig: default
        maxAttempts: 2  # Fewer retries for payment operations
      ledgerService:
        baseConfig: default

  # Bulkhead - Resource Isolation for payment operations
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 20
        maxWaitDuration: 100ms
    instances:
      razorpayApi:
        maxConcurrentCalls: 5  # Limit concurrent payment API calls
        maxWaitDuration: 200ms
      ledgerService:
        baseConfig: default

  # TimeLimiter - Timeout Control
  timelimiter:
    instances:
      razorpayApi:
        timeoutDuration: 10s  # Longer timeout for payment gateway
        cancelRunningFuture: true
      ledgerService:
        timeoutDuration: 3s
        cancelRunningFuture: true
