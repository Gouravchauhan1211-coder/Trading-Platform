server:
  port: 8091

spring:
  application:
    name: notification-service
  
  threads:
    virtual:
      enabled: true
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notification_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true  # Enables /actuator/health/liveness and /actuator/health/readiness
    prometheus:
      enabled: true
  health:
    # Kubernetes probes
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    # Dependency health indicators
    db:
      enabled: true
    rabbit:
      enabled: true
    diskSpace:
      enabled: true
      threshold: 10MB
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  # OpenTelemetry Tracing Configuration
  tracing:
    enabled: true
    sampling:
      probability: ${OTEL_TRACES_SAMPLER_ARG:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
      transport: http

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    in.winvestco: DEBUG
    org.springframework.web.socket: DEBUG

# Multi-channel notification delivery configuration
notification:
  channels:
    push:
      enabled: ${PUSH_ENABLED:false}
      firebase-project-id: ${FIREBASE_PROJECT_ID:}
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
      default-icon: ic_notification
      default-color: "#6366f1"
    email:
      enabled: ${EMAIL_ENABLED:false}
      provider: ${EMAIL_PROVIDER:sendgrid}  # sendgrid, ses, smtp
      sendgrid-api-key: ${SENDGRID_API_KEY:}
      aws-region: ${AWS_REGION:ap-south-1}
      from-address: ${EMAIL_FROM:notifications@winvestco.in}
      from-name: WinvestCo
      template-path: classpath:templates/email/
    sms:
      enabled: ${SMS_ENABLED:false}
      provider: ${SMS_PROVIDER:twilio}  # twilio, aws-sns
      twilio-account-sid: ${TWILIO_ACCOUNT_SID:}
      twilio-auth-token: ${TWILIO_AUTH_TOKEN:}
      twilio-from-number: ${TWILIO_FROM_NUMBER:}
      aws-region: ${AWS_REGION:ap-south-1}
      max-length: 160
    delivery:
      max-retries: 3
      retry-delay-ms: 1000
      retry-backoff-multiplier: 2.0
      async-enabled: true
      async-pool-size: 10

# Resilience4j Configuration
resilience4j:
  # Circuit Breaker - Fail-fast for notification channels
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - com.sendgrid.helpers.mail.MailException
          - com.twilio.exception.ApiException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$BadRequest
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - in.winvestco.common.exception.NonRetryableException
    instances:
      emailService:
        baseConfig: default
        failureRateThreshold: 40  # Moderate for email services
      smsService:
        baseConfig: default
        failureRateThreshold: 35  # Stricter for SMS services
      pushService:
        baseConfig: default
        failureRateThreshold: 45  # Moderate for push notifications
      database:
        baseConfig: default
        failureRateThreshold: 30  # Stricter for database

  # Retry - Exponential Backoff with Jitter for notification delivery
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
          - com.sendgrid.helpers.mail.MailException
          - com.twilio.exception.ApiException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$BadRequest
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - in.winvestco.common.exception.NonRetryableException
    instances:
      emailService:
        baseConfig: default
        maxAttempts: 2  # Fewer retries for email
      smsService:
        baseConfig: default
        maxAttempts: 2  # Fewer retries for SMS
      pushService:
        baseConfig: default
      database:
        baseConfig: default
        maxAttempts: 2  # Fewer retries for database

  # Bulkhead - Resource Isolation for notification channels
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 20
        maxWaitDuration: 100ms
    instances:
      emailService:
        maxConcurrentCalls: 15  # Allow more concurrent emails
        maxWaitDuration: 200ms
      smsService:
        maxConcurrentCalls: 10  # Limit concurrent SMS calls
        maxWaitDuration: 100ms
      pushService:
        maxConcurrentCalls: 25  # Allow more concurrent push notifications
        maxWaitDuration: 50ms
      database:
        maxConcurrentCalls: 10
        maxWaitDuration: 50ms

  # TimeLimiter - Timeout Control
  timelimiter:
    instances:
      emailService:
        timeoutDuration: 5s  # Longer timeout for email delivery
        cancelRunningFuture: true
      smsService:
        timeoutDuration: 3s
        cancelRunningFuture: true
      pushService:
        timeoutDuration: 2s  # Faster timeout for push notifications
        cancelRunningFuture: true
      database:
        timeoutDuration: 3s
        cancelRunningFuture: true
