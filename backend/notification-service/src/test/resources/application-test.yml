spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

notification:
  channels:
    push:
      enabled: false
    email:
      enabled: false
    sms:
      enabled: false
    delivery:
      max-retries: 3
      retry-delay-ms: 1000
      retry-backoff-multiplier: 2.0
      async-enabled: false

logging:
  level:
    in.winvestco: DEBUG
    org.springframework: WARN
