server:
  port: 8761

eureka:
  instance:
    hostname: localhost
    appname: eureka-server
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 1000
    wait-time-in-ms-when-sync-empty: 0
    response-cache-update-interval-ms: 30000

spring:
  application:
    name: eureka-server
  
  # Virtual Threads (Java 21+)
  threads:
    virtual:
      enabled: true
      
  cloud:
    config:
      enabled: false

management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true  # Enables /actuator/health/liveness and /actuator/health/readiness
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    eureka:
      enabled: true
    # Kubernetes probes
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    # Disk space monitoring
    diskSpace:
      enabled: true
      threshold: 10MB
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Resilience4j Configuration
resilience4j:
  # Circuit Breaker - Fail-fast for Eureka registry operations
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.cloud.client.discovery.DiscoveryException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$BadRequest
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - in.winvestco.common.exception.NonRetryableException
    instances:
      registry:
        baseConfig: default
        failureRateThreshold: 30  # Stricter for service registry
        waitDurationInOpenState: 60s  # Longer cooldown for registry failures

  # Retry - Conservative retry for registry operations
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1000ms  # Longer wait for registry operations
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.cloud.client.discovery.DiscoveryException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$BadRequest
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - in.winvestco.common.exception.NonRetryableException
    instances:
      registry:
        baseConfig: default
        maxAttempts: 2  # Fewer retries for registry operations

  # Bulkhead - Resource Isolation for registry operations
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 20
        maxWaitDuration: 100ms
    instances:
      registry:
        maxConcurrentCalls: 10  # Limit concurrent registry operations
        maxWaitDuration: 200ms

  # TimeLimiter - Timeout Control
  timelimiter:
    instances:
      registry:
        timeoutDuration: 5s  # Timeout for registry operations
        cancelRunningFuture: true
