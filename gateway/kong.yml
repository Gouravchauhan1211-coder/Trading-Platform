_format_version: "3.0"

services:
  # Frontend UI
  - name: frontend
    url: http://frontend:3000
    routes:
      - name: frontend-routes
        paths:
          - /
        strip_path: false

  # User Service
  - name: user-service
    url: http://user-service:8081
    routes:
      - name: user-routes
        paths:
          - /api/users
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  # Market Data Service
  - name: market-data-service
    url: http://market-data-service:8082
    routes:
      - name: market-data-routes
        paths:
          - /api/market-data
        strip_path: true

  # Strategy Engine
  - name: strategy-engine
    url: http://strategy-engine:8083
    routes:
      - name: strategy-routes
        paths:
          - /api/strategies
        strip_path: true

  # Order Service
  - name: order-service
    url: http://order-service:8084
    routes:
      - name: order-routes
        paths:
          - /api/orders
        strip_path: true

  # Portfolio Service
  - name: portfolio-service
    url: http://portfolio-service:8085
    routes:
      - name: portfolio-routes
        paths:
          - /api/portfolio
        strip_path: true

  # Risk Service
  - name: risk-service
    url: http://risk-service:8086
    routes:
      - name: risk-routes
        paths:
          - /api/risk
        strip_path: true

# JWT Plugin for authentication
jwt_secrets:
  - consumer: trading-user
    key: trading-platform-key
    algorithm: HS256
    secret: your-jwt-secret-key-change-in-production

# Plugins
plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600
